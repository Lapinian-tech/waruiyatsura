<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>悪いやつら</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <h1 class="site-title">悪いやつら</h1>
    <p class="site-subtitle">Criminal List</p>
  </div>
</header>

<div class="notice">
  本サイトはCriminal Listです。
  掲載情報の正確性・最新性については、必ず出典元の公式情報をご確認ください。
  本サイトは警察庁・警視庁・各都道府県警察とは関係ありません。
</div>

<main class="container layout">
  <aside class="panel">
    <h2>検索・絞り込み</h2>
    <div class="search-box">
      <input id="q" type="search" placeholder="氏名・罪状・地域・概要などで検索">
      <select id="categoryFilter"></select>
      <select id="statusFilter"></select>
      <select id="decadeFilter"></select>
      <select id="areaFilter"></select>
      <button id="resetFilters" type="button" class="light">条件をリセット</button>
    </div>
    <hr>
    <h2>ディレクトリ</h2>
    <div id="directories" class="dir-list"></div>
  </aside>

  <section>
    <div class="content-head">
      <h2 class="section-title">情報一覧</h2>
      <span id="count" class="count-badge">0件</span>
    </div>
    <div id="cards" class="cards"></div>
  </section>
</main>

<div id="modalBackdrop" class="modal-backdrop" aria-hidden="true">
  <section class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 id="modalTitle">詳細</h2>
      <button id="closeModal" type="button" class="light">閉じる</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
  </section>
</div>

<footer class="footer">
  <p>掲載対象は公式公開情報に限定してください。噂、私刑目的の情報、住所・勤務先・家族情報などの掲載は避けてください。</p>
</footer>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
